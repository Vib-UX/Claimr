[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

# Monad Testnet
# chain id: 10143
# explorer: https://testnet.monadscan.com
